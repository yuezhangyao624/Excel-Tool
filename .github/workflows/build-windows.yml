name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build executable
        run: |
          python -m PyInstaller --clean --onefile --console --name AttendanceChecker attendance_tool/app.py

      - name: Package executable
        shell: pwsh
        run: |
          Compress-Archive -Path dist/AttendanceChecker.exe -DestinationPath AttendanceChecker-Windows.zip

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: AttendanceChecker-Windows
          path: AttendanceChecker-Windows.zip

